app = "phenomenal"
primary_region = "syd"

[build]

[env]
  NODE_ENV = "production"
  PORT = "3000"
  DB_PATH = "/data/phenomenal.db"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "5s"

[[mounts]]
  source = "phenomenal_data"
  destination = "/data"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
