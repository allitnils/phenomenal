<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>phenomenal — qualitative research platform</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
</head>
<body>
  <nav id="sidebar">
    <div class="sidebar-logo">&gt;_ <span>phenomenal</span></div>
    <div class="nav-section">Analysis</div>
    <div class="nav-item active" data-view="transcripts">
      <span>&#128196;</span> Transcripts
    </div>
    <div class="nav-item" data-view="coding">
      <span>&#127991;</span> Coding
    </div>
    <div class="nav-item" data-view="graph">
      <span>&#128376;</span> Co-occurrence
    </div>
    <div class="nav-item" data-view="memos">
      <span>&#128221;</span> Memos
    </div>
    <div class="nav-section">Export</div>
    <div style="padding:8px 12px;display:flex;flex-direction:column;gap:6px">
      <button id="export-csv" class="btn btn-ghost" style="font-size:12px;padding:6px 10px">CSV</button>
      <button id="export-json" class="btn btn-ghost" style="font-size:12px;padding:6px 10px">JSON</button>
      <button id="export-nvivo" class="btn btn-ghost" style="font-size:12px;padding:6px 10px">NVivo</button>
    </div>
    <div style="margin-top:auto;border-top:1px solid var(--border)">
      <div class="nav-item" data-view="help" style="border-left:none;padding:8px 20px">
        <span>&#10067;</span> Help & Guide
      </div>
      <div id="sidebar-credit">
        <div style="font-size:11px;color:var(--muted);line-height:1.5">
          Built by
          <a href="https://ivanocampo.com" target="_blank" rel="noopener" style="color:var(--accent);text-decoration:none;font-weight:500">Ivan Ocampo</a>
        </div>
        <a href="mailto:ivan@ivanocampo.com?subject=phenomenal%20feedback" style="display:inline-flex;align-items:center;gap:5px;margin-top:6px;font-size:11px;color:var(--muted);text-decoration:none;padding:4px 8px;border:1px solid var(--border);border-radius:4px;transition:border-color 0.15s,color 0.15s" onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--accent)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--muted)'">
          <span style="font-size:12px">&#9993;</span> Contact
        </a>
      </div>
    </div>
  </nav>

  <div id="main">
    <div id="topbar">
      <h1 id="topbar-title">Transcripts</h1>
    </div>
    <div id="content">Loading...</div>
  </div>

  <div id="toast-container"></div>

  <script src="/js/api.js"></script>
  <script src="/js/components/toast.js"></script>
  <script src="/js/components/sidebar.js"></script>
  <script src="/js/views/transcripts.js"></script>
  <script src="/js/views/coding.js"></script>
  <script src="/js/views/graph.js"></script>
  <script src="/js/views/memos.js"></script>
  <script src="/js/views/help.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
